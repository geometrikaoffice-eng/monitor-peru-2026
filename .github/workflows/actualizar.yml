name: Actualizar monitor electoral

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:           # botón para correrlo manualmente

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install pandas requests curl_cffi

      - name: Ejecutar análisis
        run: python analizar.py

      - name: Publicar resumen.json
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add resumen.json
          git diff --cached --quiet || git commit -m "auto: actualización $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
